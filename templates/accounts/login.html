{% extends 'base.html' %}

{% block title %}Entrar | 4you RH{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto bg-white rounded-xl shadow p-6 border border-slate-200">
    <h1 class="text-2xl font-bold mb-1">Acesso ao sistema</h1>
    <p class="text-slate-600 mb-6">Entre com seu usuario e senha.</p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="id_username" class="block text-sm font-semibold mb-1">Usuario</label>
        <input id="id_username" name="username" type="text" required class="w-full rounded border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>
      <div>
        <label for="id_password" class="block text-sm font-semibold mb-1">Senha</label>
        <input id="id_password" name="password" type="password" required class="w-full rounded border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>

      {% if form.errors %}
        <p class="text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2">Credenciais invalidas.</p>
      {% endif %}

      <button type="submit" class="w-full bg-slate-900 text-white px-4 py-2.5 rounded font-semibold hover:bg-slate-800">Entrar</button>
    </form>
  </div>
{% endblock %}
